<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psyx-Manga | Empire Edition 🔴⚫</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="loading-active">

    <div id="loader">
        <div class="loader-content">
            <div class="pulse-logo">PSYX</div>
            <p>CHARGEMENT DE L'EMPIRE...</p>
        </div>
    </div>

    <nav class="ortega-nav">
        <div class="logo">PSYX<span>MANGA</span></div>
        <div class="nav-right">
            <span id="admin-stat">🪙 <b id="admin-coins">0</b></span>
            <button id="auth-btn" onclick="toggleAuth()"><i class="fas fa-user-circle"></i> Connexion</button>
        </div>
    </nav>

    <section id="user-dashboard" class="glass" style="display:none;">
        <div class="user-info">
            <h4>Bienvenue, <span id="display-username">Empire User</span> !</h4>
            <button onclick="logout()" class="logout-btn">Déconnexion</button>
        </div>
        <div class="history-container">
            <h5><i class="fas fa-history"></i> Ton Historique</h5>
            <div id="user-history" class="history-list"></div>
        </div>
    </section>

    <div class="filter-bar glass">
        <button class="tag active" onclick="filter('all')">Tous</button>
        <button class="tag" onclick="filter('shonen')">Shonen</button>
        <button class="tag" onclick="filter('seinen')">Seinen</button>
    </div>

    <main id="manga-container" class="manga-grid">
        </main>

    <div id="auth-modal" class="modal">
        <div class="modal-content glass">
            <h3>REJOINDRE L'EMPIRE</h3>
            <input type="text" id="login-user" placeholder="Nom d'utilisateur">
            <input type="password" id="login-pass" placeholder="Mot de passe">
            <button class="confirm-btn" onclick="login()">SE CONNECTER</button>
            <button class="close-btn" onclick="toggleAuth()">ANNULER</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
